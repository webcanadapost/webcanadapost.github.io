<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificador IA Instagram</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#181818;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--muted:#555;--muted2:#888;--accent:#c8ff00;
  --c0:#534AB7;--c0t:#CECBF6;
  --c1:#993556;--c1t:#F4C0D1;
  --c2:#0C447C;--c2t:#B5D4F4;
  --c3:#3B6D11;--c3t:#C0DD97;
  --c4:#854F0B;--c4t:#FAC775;
  --c5:#993C1D;--c5t:#F5C4B3;
  --c6:#3a3a38;--c6t:#D3D1C7;
  --c7:#0F6E56;--c7t:#9FE1CB;
  --c8:#A32D2D;--c8t:#F7C1C1;
  --c9:#2d2060;--c9t:#EEEDFE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.06em;white-space:nowrap}
.sw{flex:1;min-width:180px;position:relative}
.sw input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 32px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.sw input:focus{border-color:var(--border2)}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.pbar-wrap{width:100px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0}
.pbar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.hstat{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);white-space:nowrap}
.btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text)}
.legend{display:flex;flex-wrap:wrap;gap:5px;padding:10px 20px;border-bottom:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted2)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
main{padding:16px 20px;max-width:1600px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:9px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card.has-cats{border-color:rgba(200,255,0,0.18)}
.card-top{display:flex;gap:10px;align-items:center;margin-bottom:9px}
.av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid var(--border2)}
.av-fb{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);flex-shrink:0}
.meta{flex:1;min-width:0}
.hl{font-size:12px;font-weight:500;color:#7eb8f7;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hl:hover{color:#afd4fb;text-decoration:underline}
.seg{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:1px}
.desc{font-size:11px;color:var(--muted2);line-height:1.45;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cats{display:flex;flex-wrap:wrap;gap:3px}
.cat{font-size:10px;padding:3px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;line-height:1.4;transition:all .1s;white-space:nowrap}
.cat:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.cat.on{font-weight:500;border-color:transparent}
.on-0{background:var(--c0);color:var(--c0t)}
.on-1{background:var(--c1);color:var(--c1t)}
.on-2{background:var(--c2);color:var(--c2t)}
.on-3{background:var(--c3);color:var(--c3t)}
.on-4{background:var(--c4);color:var(--c4t)}
.on-5{background:var(--c5);color:var(--c5t)}
.on-6{background:var(--c6);color:var(--c6t)}
.on-7{background:var(--c7);color:var(--c7t)}
.on-8{background:var(--c8);color:var(--c8t)}
.on-9{background:var(--c9);color:var(--c9t)}
.empty{text-align:center;padding:50px;color:var(--muted);font-size:13px;grid-column:1/-1}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;font-size:11px;color:var(--text);font-family:'DM Mono',monospace;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

.stars{display:flex;align-items:center;gap:1px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.star{font-size:17px;cursor:pointer;color:#2a2a2a;transition:color .08s;line-height:1;padding:2px;user-select:none;-webkit-user-select:none}
.star.on{color:#c8ff00}
.star.hover-on{color:#888}
.star-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-left:6px}
</style>
</head>
<body>

<header>
  <div class="logo">IA / INSTAGRAM — CLASIFICADOR</div>
  <div class="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="srch" placeholder="Buscar perfil..." oninput="render()">
  </div>
  <select id="fil" onchange="render()">
    <option value="">Todos</option>
    <option value="__ok">Con categoría</option>
    <option value="__no">Sin categoría</option>
    <option value="HORROR & WEIRD">Horror & Weird</option>
    <option value="FASHION & BEAUTY">Fashion & Beauty</option>
    <option value="CINEMATIC">Cinematic</option>
    <option value="STORYTELLING">Storytelling</option>
    <option value="ADVERTISING">Advertising</option>
    <option value="EXPERIMENTAL">Experimental</option>
    <option value="HYPERREAL / TECHNICAL">Hyperreal / Technical</option>
    <option value="SCI-FI & FUTURISM">Sci-Fi & Futurism</option>
    <option value="ART DIRECTION">Art Direction</option>
    <option value="INTERNET & MEME CULTURE">Internet & Meme Culture</option>
    <option value="__5star">★★★★★ 5 estrellas</option>
    <option value="__4star">★★★★☆ 4+ estrellas</option>
    <option value="__3star">★★★☆☆ 3+ estrellas</option>
    <option value="__nostar">Sin valorar</option>
  </select>
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
  <span class="hstat" id="stat"></span>
  <button class="btn" onclick="exportData()">↓ Exportar</button>
  <button class="btn" onclick="importData()">↑ Importar</button>
</header>

<div class="legend" id="legend"></div>
<main><div class="grid" id="grid"></div></main>
<div class="toast" id="toast"></div>

<script>
// Collaborative Instagram-style classifier
// - Uses Firebase Realtime Database when configured (paste config via the "Conectar" button)
// - Falls back to localStorage when Firebase isn't connected
// - Export / Import for easy sharing of snapshot data

(function(){
  // ---------------------- Configuration & State ----------------------
  const SAMPLE_DATA = [
    {id:'u1',name:'Ana García',handle:'@ana.photo',bio:'Fotografía editorial y retrato.',cats:[],avatar:'https://picsum.photos/seed/ana/96',stars:{}},
    {id:'u2',name:'Studio XX',handle:'@studioxx',bio:'Dirección de arte y experimentos visuales.',cats:['EXPERIMENTAL'],avatar:'https://picsum.photos/seed/studio/96',stars:{}},
    {id:'u3',name:'Miguel Lens',handle:'@miguellens',bio:'Cinematic color grading & storytelling.',cats:['CINEMATIC','STORYTELLING'],avatar:'https://picsum.photos/seed/miguel/96',stars:{}},
  ];

  const CLIENT_ID_KEY = 'cc_client_id_v1';
  const DATA_KEY = 'cc_clasificador_data_v1';
  let state = {items:[], connected:false};
  let firebaseApp = null;
  let dbRef = null;
  let clientId = localStorage.getItem(CLIENT_ID_KEY) || ('c_'+Math.random().toString(36).slice(2,9));
  localStorage.setItem(CLIENT_ID_KEY, clientId);

  // ---------------------- Helpers ----------------------
  const $ = sel => document.querySelector(sel);
  const toast = (msg, t=2500)=>{
    const el = $('#toast'); el.textContent = msg; el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), t);
  };

  function saveLocal(){ localStorage.setItem(DATA_KEY, JSON.stringify(state.items)); }
  function loadLocal(){ try{ const d = JSON.parse(localStorage.getItem(DATA_KEY)); if(Array.isArray(d)) return d; }catch(e){} return null; }

  // ---------------------- Firebase (dynamic) ----------------------
  async function initFirebaseFromConfig(cfg){
    try{
      if(!cfg) throw new Error('No config provided');
      // load CDN SDKs
      await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
      firebaseApp = window.firebase.initializeApp(cfg);
      const database = window.firebase.database();
      dbRef = database.ref('clasificador_ia_instagram');
      // initial sync
      dbRef.once('value', snap=>{
        const val = snap.val();
        if(val && Array.isArray(val.items)){
          state.items = val.items;
          saveLocal();
          render();
          toast('Conectado a Firebase — datos sincronizados');
        } else {
          // push local snapshot if DB empty
          dbRef.set({items:state.items});
          toast('Conectado a Firebase — base inicializada');
        }
      });
      // listen for updates
      dbRef.on('value', snap=>{
        const val = snap.val();
        if(val && Array.isArray(val.items)){
          state.items = val.items;
          saveLocal();
          render();
        }
      });
      state.connected = true;
    }catch(err){
      console.error('Firebase init error', err);
      toast('Error al conectar Firebase');
      state.connected = false;
    }
  }

  function loadScript(src){
    return new Promise((resolve,reject)=>{
      const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
    });
  }

  function pushUpdate(){
    if(state.connected && dbRef){
      dbRef.set({items:state.items}).catch(err=>console.warn(err));
    } else saveLocal();
  }

  // ---------------------- Data / Render ----------------------
  function ensureData(){
    const local = loadLocal();
    state.items = local || SAMPLE_DATA.map(i=>({...i}));
    // ensure shapes
    state.items.forEach(it=>{ it.cats = it.cats||[]; it.stars = it.stars||{}; });
  }

  function render(){
    const grid = $('#grid'); grid.innerHTML='';
    const q = $('#srch').value.trim().toLowerCase();
    const fil = $('#fil').value;
    let items = state.items.slice();
    if(q) items = items.filter(it=> (it.name+' '+it.handle+' '+(it.bio||'')).toLowerCase().includes(q));
    if(fil){
      if(fil==='__ok') items = items.filter(it=>it.cats && it.cats.length>0);
      else if(fil==='__no') items = items.filter(it=>!it.cats || it.cats.length===0);
      else if(fil==='__5star') items = items.filter(it=>avgStars(it)>=5);
      else if(fil==='__4star') items = items.filter(it=>avgStars(it)>=4);
      else if(fil==='__3star') items = items.filter(it=>avgStars(it)>=3);
      else if(fil==='__nostar') items = items.filter(it=>Object.keys(it.stars||{}).length===0);
      else items = items.filter(it=> (it.cats||[]).includes(fil) );
    }

    const total = state.items.length; const shown = items.length;
    $('#pbar').style.width = (total? Math.round((shown/total)*100):0)+'%';
    $('#stat').textContent = `${shown}/${total}`;

    if(items.length===0){
      const e = document.createElement('div'); e.className='empty'; e.textContent='No hay resultados'; grid.appendChild(e); return;
    }

    items.forEach(item=>{
      const card = document.createElement('article'); card.className='card'+((item.cats&&item.cats.length)?' has-cats':'');
      const top = document.createElement('div'); top.className='card-top';
      const av = document.createElement('img'); av.className='av'; av.src=item.avatar||''; av.alt='Avatar '+item.name;
      top.appendChild(av);
      const meta = document.createElement('div'); meta.className='meta';
      const hl = document.createElement('a'); hl.className='hl'; hl.href='#'; hl.textContent=item.name+' '+(item.handle||''); hl.onclick=e=>e.preventDefault();
      const seg = document.createElement('div'); seg.className='seg'; seg.textContent=item.handle||'';
      const desc = document.createElement('div'); desc.className='desc'; desc.textContent=item.bio||'';
      meta.appendChild(hl); meta.appendChild(seg); meta.appendChild(desc);
      top.appendChild(meta);
      card.appendChild(top);

      const catsWrap = document.createElement('div'); catsWrap.className='cats';
      const categories = [
        'HORROR & WEIRD','FASHION & BEAUTY','CINEMATIC','STORYTELLING','ADVERTISING','EXPERIMENTAL','HYPERREAL / TECHNICAL','SCI-FI & FUTURISM','ART DIRECTION','INTERNET & MEME CULTURE'
      ];
      categories.forEach((c, idx)=>{
        const b = document.createElement('button'); b.className='cat'+(item.cats.includes(c)?' on on-'+(idx%10):''); b.textContent=c; b.setAttribute('aria-pressed', item.cats.includes(c));
        b.onclick = ()=>{ toggleCategory(item.id, c); };
        catsWrap.appendChild(b);
      });
      card.appendChild(catsWrap);

      const starsWrap = document.createElement('div'); starsWrap.className='stars';
      for(let s=1;s<=5;s++){
        const sp = document.createElement('div'); sp.className='star'; sp.innerHTML='★';
        const userRating = item.stars[clientId] || 0;
        const average = avgStars(item);
        if(userRating>=s) sp.classList.add('on'); else if(!userRating && average>=s) sp.classList.add('hover-on');
        sp.onclick = ()=>{ setRating(item.id, s); };
        starsWrap.appendChild(sp);
      }
      const sc = document.createElement('div'); sc.className='star-count'; sc.textContent = avgStars(item)>0? avgStars(item).toFixed(1)+' ('+Object.keys(item.stars||{}).length+')':'Sin valorar';
      starsWrap.appendChild(sc);
      card.appendChild(starsWrap);

      grid.appendChild(card);
    });
  }

  function avgStars(item){
    const vals = Object.values(item.stars||{}).map(v=>Number(v)||0); if(!vals.length) return 0; return vals.reduce((a,b)=>a+b,0)/vals.length;
  }

  // ---------------------- Actions ----------------------
  function toggleCategory(id, cat){
    const it = state.items.find(x=>x.id===id); if(!it) return;
    const idx = it.cats.indexOf(cat);
    if(idx>=0) it.cats.splice(idx,1); else it.cats.push(cat);
    pushUpdate(); render();
  }

  function setRating(id, rating){
    const it = state.items.find(x=>x.id===id); if(!it) return;
    if(!it.stars) it.stars={};
    const current = Number(it.stars[clientId]||0);
    if(current===rating){ delete it.stars[clientId]; } else { it.stars[clientId]=rating; }
    pushUpdate(); render();
  }

  // ---------------------- Import / Export ----------------------
  function exportData(){
    const data = JSON.stringify(state.items, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='clasificador_snapshot.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast('Exportado');
  }

  function importData(){
    const inp = document.createElement('input'); inp.type='file'; inp.accept='application/json';
    inp.onchange = e=>{
      const f = inp.files[0]; if(!f) return; const reader=new FileReader(); reader.onload=ev=>{
        try{ const parsed = JSON.parse(ev.target.result); if(Array.isArray(parsed)){
          state.items = parsed; saveLocal(); pushUpdate(); render(); toast('Importado');
        } else toast('JSON no contiene array'); }catch(err){ toast('Error al leer archivo'); }
      }; reader.readAsText(f);
    };
    inp.click();
  }

  // ---------------------- Connect UI ----------------------
  function connectFirebasePrompt(){
    const txt = prompt('Pega aquí tu Firebase config JSON (objecto).\nEjemplo: {apiKey:..., authDomain:..., databaseURL:..., projectId:...}');
    if(!txt) return;
    try{ const cfg = JSON.parse(txt); initFirebaseFromConfig(cfg); }
    catch(e){ toast('Config inválida'); }
  }

  // ---------------------- Init ----------------------
  window.exportData = exportData;
  window.importData = importData;
  window.render = render;
  window.connectFirebase = connectFirebasePrompt;

  // add connect button to header
  (function addConnectBtn(){
    const header = document.querySelector('header');
    const btn = document.createElement('button'); btn.className='btn'; btn.textContent='Conectar'; btn.title='Conectar a Firebase para colaboración en tiempo real'; btn.onclick=connectFirebasePrompt;
    header.appendChild(btn);
  })();

  ensureData(); render();

})();

</script>

</body>
</html>
