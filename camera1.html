<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camera">
<title>Camera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --shutter: clamp(64px, 18vw, 82px);
    --shutter-inner: clamp(46px, 13vw, 60px);
    --aux-w: clamp(44px, 12vw, 56px);
    --aux-h: clamp(36px, 9vh, 44px);
    --top-pad: max(env(safe-area-inset-top), 14px);
    --bot-pad: max(env(safe-area-inset-bottom), 20px);
    --font-xs: clamp(10px, 2.5vw, 12px);
    --font-sm: clamp(11px, 2.8vw, 13px);
    --font-md: clamp(13px, 3.3vw, 15px);
  }

  body {
    background: #000;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }

  #video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #video.front { transform: scaleX(-1); }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }

  /* ── Top bar ── */
  #top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--top-pad) clamp(16px, 5vw, 24px) 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent);
  }

  .top-btn {
    pointer-events: all;
    background: none;
    border: none;
    cursor: pointer;
    width: clamp(30px, 8vw, 38px);
    height: clamp(30px, 8vw, 38px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #rec-info {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 58px;
    justify-content: center;
  }

  #rec-dot {
    width: clamp(8px, 2.5vw, 11px);
    height: clamp(8px, 2.5vw, 11px);
    border-radius: 50%;
    background: #ff3b30;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  #rec-dot.visible { opacity: 1; animation: blink 1.8s ease-in-out infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #rec-time {
    font-size: var(--font-md);
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
    font-variant-numeric: tabular-nums;
    min-width: 34px;
  }

  #resolution {
    font-size: var(--font-xs);
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    letter-spacing: 0.3px;
    text-align: right;
    min-width: 44px;
  }

  /* ── Center (viewfinder) ── */
  #center {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
  }

  #af-wrap {
    position: relative;
    width: clamp(60px, 16vw, 80px);
    height: clamp(60px, 16vw, 80px);
    margin-right: -44px;
  }

  .corner {
    position: absolute;
    width: clamp(12px, 4vw, 18px);
    height: clamp(12px, 4vw, 18px);
    border-color: #ffd60a;
    border-style: solid;
    border-width: 0;
  }
  .tl { top: 0; left: 0;  border-top-width: 1.5px; border-left-width: 1.5px; }
  .tr { top: 0; right: 0; border-top-width: 1.5px; border-right-width: 1.5px; }
  .bl { bottom: 0; left: 0;  border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .br { bottom: 0; right: 0; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  #sun-wrap {
    position: absolute;
    right: -42px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  #sun-icon { width: 17px; height: 17px; color: #ffd60a; }
  #exp-track {
    width: 2px;
    height: 34px;
    background: rgba(255,214,10,0.3);
    border-radius: 1px;
    position: relative;
  }
  #exp-thumb {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ffd60a;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── Mode strip (in-flow, above bottom bar) ── */
  #mode-strip {
    display: flex;
    gap: clamp(18px, 5vw, 26px);
    justify-content: center;
    pointer-events: all;
    padding: clamp(6px, 1.5vh, 10px) 0;
  }
  #mode-strip span {
    font-size: var(--font-xs);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    padding: 3px 2px;
    transition: color 0.2s;
  }
  #mode-strip span.active {
    color: #ffd60a;
    border-bottom: 1px solid rgba(255,214,10,0.55);
  }

  /* ── Bottom bar ── */
  #bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px, 2.5vh, 16px) clamp(24px, 8vw, 40px) var(--bot-pad);
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    pointer-events: all;
  }

  #gallery {
    width: var(--aux-w);
    height: var(--aux-h);
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
  }
  #gallery img { width: 100%; height: 100%; object-fit: cover; display: none; }
  #gallery svg { opacity: 0.6; }

  #shutter {
    width: var(--shutter);
    height: var(--shutter);
    border-radius: 50%;
    border: clamp(2.5px, 0.8vw, 3.5px) solid #fff;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  #shutter:active { transform: scale(0.95); }

  #shutter-inner {
    width: var(--shutter-inner);
    height: var(--shutter-inner);
    border-radius: 50%;
    background: #ff3b30;
    transition: border-radius 0.25s cubic-bezier(.4,0,.2,1),
                width 0.25s, height 0.25s, background 0.2s;
  }
  #shutter.recording #shutter-inner {
    width: clamp(26px, 8vw, 36px);
    height: clamp(26px, 8vw, 36px);
    border-radius: 6px;
  }
  body.photo-mode #shutter-inner { background: #fff; }

  #flip {
    width: var(--aux-w);
    height: var(--aux-h);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
  }
  #flip:active { transform: rotate(180deg); }

  /* ── Flash overlay ── */
  #flash-overlay {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none; z-index: 50;
    transition: opacity 0.07s ease-out;
  }

  /* ── Gallery overlay ── */
  #gallery-overlay {
    display: none; position: fixed; inset: 0;
    background: #000; z-index: 400; flex-direction: column;
  }
  #gallery-overlay.open { display: flex; }
  #gallery-header {
    padding: var(--top-pad) clamp(16px,5vw,22px) 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  #gallery-title { color: rgba(255,255,255,0.45); font-size: var(--font-sm); }
  #gallery-close {
    color: #fff; font-size: 22px; cursor: pointer;
    background: none; border: none; padding: 4px 6px; opacity: 0.7; line-height: 1;
  }
  #gallery-grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 2px; padding: 2px; align-content: start;
  }
  .g-item { position: relative; overflow: hidden; aspect-ratio: 1; }
  .g-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .g-vid-badge {
    position: absolute; bottom: 5px; left: 5px;
    background: rgba(0,0,0,0.55); border-radius: 3px;
    padding: 2px 6px; font-size: 10px; color: #fff;
  }
  #gallery-empty {
    grid-column: span 3; padding: 60px 20px;
    color: rgba(255,255,255,0.22); font-size: var(--font-sm); text-align: center;
  }

  /* ── Permission screen ── */
  #permission-screen {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: clamp(12px,3vh,18px); z-index: 100;
  }
  #permission-screen svg { opacity: 0.35; }
  #permission-screen p {
    color: rgba(255,255,255,0.6); font-size: var(--font-md);
    text-align: center; max-width: 220px; line-height: 1.5;
  }
  #permission-screen button {
    margin-top: 6px; background: none;
    border: 1px solid rgba(255,214,10,0.6); color: #ffd60a;
    font-size: var(--font-md); padding: clamp(8px,2vh,12px) 28px;
    border-radius: 22px; cursor: pointer;
  }

  #error-msg {
    display: none; position: fixed;
    bottom: clamp(100px, 15vh, 130px); left: 50%;
    transform: translateX(-50%); background: rgba(0,0,0,0.75);
    color: #fff; font-size: var(--font-sm); padding: 8px 16px;
    border-radius: 20px; white-space: nowrap; z-index: 200;
  }

  /* Small iPhone SE / compact height */
  @media (max-height: 700px) {
    #af-wrap { width: 52px; height: 52px; }
    #mode-strip { padding: 4px 0; }
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div id="flash-overlay"></div>

<div id="overlay">

  <div id="top">
    <button class="top-btn" id="flash-btn" aria-label="Flash">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"
          fill="#ffd60a" stroke="#ffd60a" stroke-width="1" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="rec-info">
      <div id="rec-dot"></div>
      <span id="rec-time"></span>
    </div>
    <span id="resolution">4K · 30</span>
  </div>

  <div id="center">
    <div id="af-wrap">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="sun-wrap">
        <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd60a" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5"/>   <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>   <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
          <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
        <div id="exp-track"><div id="exp-thumb"></div></div>
      </div>
    </div>
  </div>

  <div id="mode-strip">
    <span data-m="photo">PHOTO</span>
    <span class="active" data-m="video">VIDEO</span>
  </div>

  <div id="bottom">
    <div id="gallery" role="button" aria-label="Gallery">
      <img id="gallery-thumb" alt="last photo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>

    <button id="shutter" aria-label="Capture">
      <div id="shutter-inner"></div>
    </button>

    <button id="flip" aria-label="Flip camera">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7H4"/><polyline points="7 4 4 7 7 10"/>
        <path d="M4 17H20"/><polyline points="17 14 20 17 17 20"/>
      </svg>
    </button>
  </div>

</div>

<!-- Gallery overlay -->
<div id="gallery-overlay">
  <div id="gallery-header">
    <span id="gallery-title">Gallery</span>
    <button id="gallery-close">×</button>
  </div>
  <div id="gallery-grid"></div>
</div>

<div id="permission-screen">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
    <circle cx="12" cy="13" r="4"/>
  </svg>
  <p>Camera access is required to continue</p>
  <button id="start-btn">Enable Camera</button>
</div>

<div id="error-msg"></div>

<script>
  const video          = document.getElementById('video');
  const recDot         = document.getElementById('rec-dot');
  const recTime        = document.getElementById('rec-time');
  const shutter        = document.getElementById('shutter');
  const flipBtn        = document.getElementById('flip');
  const permScreen     = document.getElementById('permission-screen');
  const startBtn       = document.getElementById('start-btn');
  const errorMsg       = document.getElementById('error-msg');
  const flashOverlay   = document.getElementById('flash-overlay');
  const galleryEl      = document.getElementById('gallery');
  const galleryThumb   = document.getElementById('gallery-thumb');
  const galleryOverlay = document.getElementById('gallery-overlay');
  const galleryGrid    = document.getElementById('gallery-grid');
  const galleryClose   = document.getElementById('gallery-close');

  let stream = null, timerInterval = null, seconds = 0;
  let facingMode = 'environment', mode = 'video', recording = false, captures = [];

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });
      video.srcObject = stream;
      video.className = facingMode === 'user' ? 'front' : '';
      permScreen.style.display = 'none';
    } catch (e) {
      showError('Could not access the camera');
    }
  }

  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  document.querySelectorAll('#mode-strip span').forEach(s => {
    s.addEventListener('click', () => {
      if (recording) return;
      document.querySelectorAll('#mode-strip span').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      mode = s.dataset.m;
      document.body.classList.toggle('photo-mode', mode === 'photo');
    });
  });

  shutter.addEventListener('click', () => {
    if (!stream) return;
    if (mode === 'photo') takePhoto();
    else recording ? stopFakeRec() : startFakeRec();
  });

  function takePhoto() {
    flashOverlay.style.opacity = '1';
    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 130);
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    canvas.getContext('2d').drawImage(video, 0, 0);
    captures.unshift({ type: 'photo', url: canvas.toDataURL('image/jpeg', 0.88) });
    refreshThumb();
  }

  function startFakeRec() {
    recording = true;
    shutter.classList.add('recording');
    recDot.classList.add('visible');
    seconds = 0; updateTime();
    timerInterval = setInterval(() => { seconds++; updateTime(); }, 1000);
  }

  function stopFakeRec() {
    recording = false;
    clearInterval(timerInterval);
    shutter.classList.remove('recording');
    recDot.classList.remove('visible');
    recTime.textContent = '';
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    canvas.getContext('2d').drawImage(video, 0, 0);
    captures.unshift({ type: 'video', url: canvas.toDataURL('image/jpeg', 0.75) });
    refreshThumb();
  }

  function updateTime() {
    const m = String(Math.floor(seconds / 60)).padStart(1, '0');
    const s = String(seconds % 60).padStart(2, '0');
    recTime.textContent = `${m}:${s}`;
  }

  function refreshThumb() {
    if (!captures.length) return;
    galleryThumb.src = captures[0].url;
    galleryThumb.style.display = 'block';
    galleryEl.querySelector('svg').style.display = 'none';
  }

  galleryEl.addEventListener('click', openGallery);
  galleryClose.addEventListener('click', () => galleryOverlay.classList.remove('open'));

  function openGallery() {
    galleryGrid.innerHTML = '';
    if (!captures.length) {
      galleryGrid.innerHTML = '<p id="gallery-empty">No captures yet</p>';
    } else {
      captures.forEach(c => {
        const wrap = document.createElement('div');
        wrap.className = 'g-item';
        const img = document.createElement('img');
        img.src = c.url;
        wrap.appendChild(img);
        if (c.type === 'video') {
          const badge = document.createElement('div');
          badge.className = 'g-vid-badge';
          badge.textContent = '▶';
          wrap.appendChild(badge);
        }
        galleryGrid.appendChild(wrap);
      });
    }
    galleryOverlay.classList.add('open');
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
  }

  startBtn.addEventListener('click', startCamera);
  navigator.permissions?.query({ name: 'camera' }).then(r => {
    if (r.state === 'granted') startCamera();
  });
</script>
</body>
</html>
