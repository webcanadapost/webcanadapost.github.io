<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera — Pill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --shutter: clamp(60px,16vw,74px);
  --shutter-inner: clamp(47px,13vw,60px);
  --aux: clamp(40px,10vw,48px);
  --top-pad: max(env(safe-area-inset-top),14px);
  --bot-pad: max(env(safe-area-inset-bottom),24px);
  --font-xs: clamp(10px,2.5vw,12px);
  --font-sm: clamp(11px,2.8vw,13px);
  --font-mode: clamp(10px,2.5vw,12px);
}

body{background:#111;width:100vw;height:100dvh;overflow:hidden;font-family:-apple-system,"SF Pro Text",sans-serif}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#video.front{transform:scaleX(-1)}

#overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}

/* ── Top pill ── */
#top{padding:var(--top-pad) clamp(12px,3vw,18px) 0;display:flex;justify-content:center}
#top-pill{
  pointer-events:all;
  background:rgba(20,20,20,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:0.5px solid rgba(255,255,255,0.1);border-radius:100px;
  padding:clamp(8px,2vw,11px) clamp(14px,4vw,20px);
  display:flex;align-items:center;
  gap:clamp(10px,2.5vw,16px);
  overflow-x:auto;scrollbar-width:none;
  max-width:calc(100vw - 30px);
}
#top-pill::-webkit-scrollbar{display:none}

#flash-btn{background:none;border:none;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;opacity:0.7;flex-shrink:0}
.divider{width:0.5px;height:14px;background:rgba(255,255,255,0.15);flex-shrink:0}

#rec-row{display:flex;align-items:center;gap:5px;flex-shrink:0}
#rec-dot{width:clamp(6px,1.7vw,8px);height:clamp(6px,1.7vw,8px);border-radius:50%;background:#ff453a;opacity:0;transition:opacity 0.2s}
#rec-dot.visible{opacity:1;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
#rec-time{font-size:var(--font-sm);font-weight:500;color:#fff;letter-spacing:0.5px;font-variant-numeric:tabular-nums;min-width:28px}

#resolution{font-size:var(--font-xs);color:rgba(255,255,255,0.5);letter-spacing:0.3px;flex-shrink:0}

.zoom-btn{background:none;border:none;cursor:pointer;font-size:var(--font-xs);font-weight:600;color:rgba(255,255,255,0.5);padding:2px 4px;border-radius:20px;flex-shrink:0}
.zoom-btn.active{color:#fff;background:rgba(255,255,255,0.12)}

/* Mode pill switcher */
#mode-pill-row{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.07);border-radius:100px;padding:3px 4px;flex-shrink:0}
.pill-mode{
  font-size:var(--font-mode);font-weight:500;letter-spacing:0.6px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);cursor:pointer;
  padding:clamp(3px,0.8vw,5px) clamp(7px,2vw,11px);
  border-radius:100px;transition:all 0.18s;white-space:nowrap;
}
.pill-mode.active{color:#fff;background:rgba(255,255,255,0.14)}

/* ── Center ── */
#center{flex:1;display:flex;align-items:center;justify-content:center}
#af-ring{
  width:clamp(46px,12vw,60px);height:clamp(46px,12vw,60px);
  border-radius:50%;border:1px solid rgba(255,255,255,0.5);
}

/* ── Bottom pill ── */
#bottom{padding:clamp(10px,2.5vh,16px) clamp(14px,4vw,24px) var(--bot-pad);display:flex;align-items:center;justify-content:space-between;pointer-events:all}
#bottom-pill{
  background:rgba(20,20,20,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:0.5px solid rgba(255,255,255,0.1);border-radius:100px;
  padding:clamp(10px,2.5vw,14px) clamp(14px,4vw,20px);
  display:flex;align-items:center;gap:clamp(14px,4vw,22px);flex:1;
}

#gallery{
  width:var(--aux);height:var(--aux);
  border-radius:clamp(8px,2.5vw,13px);
  background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;flex-shrink:0;
}
#gallery img{width:100%;height:100%;object-fit:cover;display:none}
.spacer{flex:1}

#shutter{
  width:var(--shutter);height:var(--shutter);
  border-radius:50%;border:clamp(2px,0.6vw,2.5px) solid rgba(255,255,255,0.8);
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.1s;flex-shrink:0;
}
#shutter:active{transform:scale(0.94)}
#shutter-inner{
  width:var(--shutter-inner);height:var(--shutter-inner);
  border-radius:50%;background:rgba(255,255,255,0.88);
  transition:border-radius 0.22s,width 0.22s,height 0.22s,background 0.22s;
}
#shutter.recording #shutter-inner{
  width:clamp(22px,6vw,30px);height:clamp(22px,6vw,30px);border-radius:5px;
}
body.video-mode #shutter-inner{background:rgba(255,70,58,0.85)}
body.photo-mode #shutter-inner{background:rgba(255,255,255,0.88)}

#flip{
  width:var(--aux);height:var(--aux);
  background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.12);
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.35s;flex-shrink:0;
}
#flip:active{transform:rotate(180deg)}

/* Flash overlay */
#flash-overlay{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity 0.07s ease-out}

/* Gallery overlay */
#gallery-overlay{display:none;position:fixed;inset:0;background:#111;z-index:400;flex-direction:column}
#gallery-overlay.open{display:flex}
#gallery-header{
  padding:var(--top-pad) clamp(16px,4vw,22px) 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid rgba(255,255,255,0.08);
}
#gallery-title{color:rgba(255,255,255,0.4);font-size:var(--font-sm)}
#gallery-close{color:rgba(255,255,255,0.65);font-size:22px;cursor:pointer;background:none;border:none;padding:4px 6px;line-height:1}
#gallery-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;align-content:start}
.g-item{position:relative;overflow:hidden;aspect-ratio:1}
.g-item img{width:100%;height:100%;object-fit:cover;display:block}
.g-vid-badge{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.55);border-radius:100px;padding:2px 7px;font-size:10px;color:#fff}
#gallery-empty{grid-column:span 3;padding:60px 20px;color:rgba(255,255,255,0.2);font-size:clamp(12px,3vw,14px);text-align:center}

#permission-screen{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,3vh,20px);z-index:100}
#permission-screen p{color:rgba(255,255,255,0.45);font-size:clamp(13px,3.3vw,15px);text-align:center;max-width:210px;line-height:1.6}
#start-btn{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:clamp(13px,3.3vw,15px);padding:clamp(9px,2vh,12px) 30px;border-radius:100px;cursor:pointer}

@media(max-height:700px){
  #top-pill{padding:7px 14px}
  #bottom-pill{padding:10px 14px}
}
</style>
</head>
<body class="video-mode">
<video id="video" autoplay playsinline muted></video>
<div id="flash-overlay"></div>
<div id="overlay">
  <div id="top">
    <div id="top-pill">
      <button id="flash-btn" aria-label="Flash">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z" fill="rgba(255,255,255,0.8)" stroke="rgba(255,255,255,0.8)" stroke-width="0.5" stroke-linejoin="round"/></svg>
      </button>
      <div class="divider"></div>
      <div id="rec-row">
        <div id="rec-dot"></div>
        <span id="rec-time">0:00</span>
      </div>
      <div class="divider"></div>
      <span id="resolution">4K 30fps</span>
      <div class="divider"></div>
      <button class="zoom-btn">0.5×</button>
      <button class="zoom-btn active">1×</button>
      <button class="zoom-btn">2×</button>
      <div class="divider"></div>
      <div id="mode-pill-row">
        <span class="pill-mode" data-m="photo">Photo</span>
        <span class="pill-mode active" data-m="video">Video</span>
      </div>
    </div>
  </div>

  <div id="center">
    <div id="af-ring"></div>
  </div>

  <div id="bottom">
    <div id="bottom-pill">
      <div id="gallery" role="button" aria-label="Gallery">
        <img id="gallery-thumb" alt="last photo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div class="spacer"></div>
      <button id="shutter" aria-label="Capture"><div id="shutter-inner"></div></button>
      <div class="spacer"></div>
      <button id="flip" aria-label="Flip camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4"/><polyline points="7 4 4 7 7 10"/><path d="M4 17H20"/><polyline points="17 14 20 17 17 20"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Gallery overlay -->
<div id="gallery-overlay">
  <div id="gallery-header">
    <span id="gallery-title">Gallery</span>
    <button id="gallery-close">×</button>
  </div>
  <div id="gallery-grid"></div>
</div>

<div id="permission-screen">
  <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  <p>Camera access is required</p>
  <button id="start-btn">Enable Camera</button>
</div>
<script>
const video=document.getElementById('video'),recDot=document.getElementById('rec-dot'),recTime=document.getElementById('rec-time'),shutter=document.getElementById('shutter'),flipBtn=document.getElementById('flip'),permScreen=document.getElementById('permission-screen'),startBtn=document.getElementById('start-btn'),flashOverlay=document.getElementById('flash-overlay'),galleryEl=document.getElementById('gallery'),galleryThumb=document.getElementById('gallery-thumb'),galleryOverlay=document.getElementById('gallery-overlay'),galleryGrid=document.getElementById('gallery-grid'),galleryClose=document.getElementById('gallery-close');
let stream=null,timerInterval=null,seconds=0,facingMode='environment',mode='video',recording=false,captures=[];

async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:3840},height:{ideal:2160}},audio:false});video.srcObject=stream;video.className=facingMode==='user'?'front':'';permScreen.style.display='none'}catch(e){}}

flipBtn.addEventListener('click',()=>{facingMode=facingMode==='environment'?'user':'environment';startCamera()});
document.querySelectorAll('.pill-mode').forEach(s=>{s.addEventListener('click',()=>{if(recording)return;document.querySelectorAll('.pill-mode').forEach(x=>x.classList.remove('active'));s.classList.add('active');mode=s.dataset.m;document.body.className=mode+'-mode'})});
shutter.addEventListener('click',()=>{if(!stream)return;if(mode==='photo'){takePhoto()}else{recording?stopFakeRec():startFakeRec()}});

function takePhoto(){flashOverlay.style.opacity='1';setTimeout(()=>{flashOverlay.style.opacity='0'},130);const canvas=document.createElement('canvas');canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;canvas.getContext('2d').drawImage(video,0,0);captures.unshift({type:'photo',url:canvas.toDataURL('image/jpeg',0.88)});refreshThumb()}
function startFakeRec(){recording=true;shutter.classList.add('recording');recDot.classList.add('visible');seconds=0;updateTime();timerInterval=setInterval(()=>{seconds++;updateTime()},1000)}
function stopFakeRec(){recording=false;clearInterval(timerInterval);shutter.classList.remove('recording');recDot.classList.remove('visible');recTime.textContent='0:00';const canvas=document.createElement('canvas');canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;canvas.getContext('2d').drawImage(video,0,0);captures.unshift({type:'video',url:canvas.toDataURL('image/jpeg',0.75)});refreshThumb()}
function updateTime(){const m=String(Math.floor(seconds/60)).padStart(1,'0');const s=String(seconds%60).padStart(2,'0');recTime.textContent=`${m}:${s}`}
function refreshThumb(){if(!captures.length)return;galleryThumb.src=captures[0].url;galleryThumb.style.display='block';galleryEl.querySelector('svg').style.display='none'}

galleryEl.addEventListener('click',openGallery);
galleryClose.addEventListener('click',()=>galleryOverlay.classList.remove('open'));
function openGallery(){galleryGrid.innerHTML='';if(!captures.length){galleryGrid.innerHTML='<p id="gallery-empty">No captures yet</p>'}else{captures.forEach(c=>{const wrap=document.createElement('div');wrap.className='g-item';const img=document.createElement('img');img.src=c.url;wrap.appendChild(img);if(c.type==='video'){const badge=document.createElement('div');badge.className='g-vid-badge';badge.textContent='▶';wrap.appendChild(badge)}galleryGrid.appendChild(wrap)})}galleryOverlay.classList.add('open')}

startBtn.addEventListener('click',startCamera);
navigator.permissions?.query({name:'camera'}).then(r=>{if(r.state==='granted')startCamera()});
document.querySelectorAll('.zoom-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.zoom-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active')})});
</script>
</body>
</html>
