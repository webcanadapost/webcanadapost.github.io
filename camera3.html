<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Camera — Nordic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --shutter: clamp(62px,17vw,78px);
  --shutter-inner: clamp(50px,14vw,66px);
  --aux: clamp(42px,11vw,52px);
  --top-pad: max(env(safe-area-inset-top),18px);
  --bot-pad: max(env(safe-area-inset-bottom),28px);
  --font-xs: clamp(9px,2.3vw,11px);
  --font-sm: clamp(10px,2.6vw,12px);
  --font-mode: clamp(10px,2.5vw,12px);
}

body{background:#0a0a0a;width:100vw;height:100dvh;overflow:hidden;font-family:-apple-system,"Helvetica Neue",sans-serif}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#video.front{transform:scaleX(-1)}

#overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}

#top{
  padding:var(--top-pad) clamp(18px,5vw,26px) 14px;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.top-btn{pointer-events:all;background:none;border:none;cursor:pointer;width:clamp(34px,9vw,42px);height:clamp(34px,9vw,42px);display:flex;align-items:center;justify-content:center}

#rec-info{display:flex;flex-direction:column;align-items:center;gap:4px}
#rec-dot{width:clamp(5px,1.5vw,7px);height:clamp(5px,1.5vw,7px);border-radius:50%;background:#e8e0d4;opacity:0;transition:opacity 0.2s}
#rec-dot.visible{opacity:1;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#rec-time{font-size:var(--font-sm);font-weight:500;color:rgba(255,255,255,0.5);letter-spacing:2px;font-variant-numeric:tabular-nums}
#resolution{font-size:var(--font-xs);color:rgba(255,255,255,0.35);font-weight:400;letter-spacing:1.5px;text-align:right}

#center{flex:1;display:flex;align-items:center;justify-content:center}
#crosshair{position:relative;width:clamp(46px,12vw,64px);height:clamp(46px,12vw,64px)}
#crosshair::before,#crosshair::after{content:"";position:absolute;background:rgba(255,255,255,0.6)}
#crosshair::before{width:1px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:1px;top:50%;transform:translateY(-50%)}
.dot-center{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.9);top:50%;left:50%;transform:translate(-50%,-50%)}

/* Mode strip – in flow, above shutter row */
#mode-strip{
  display:flex;gap:clamp(14px,4vw,22px);justify-content:center;
  pointer-events:all;
  padding:clamp(5px,1.2vh,9px) 0;
}
#mode-strip span{
  font-size:var(--font-mode);letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.28);cursor:pointer;padding:4px 2px;transition:color 0.2s;
}
#mode-strip span.active{color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.5)}

/* Bottom row: gallery · shutter · flip */
#bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(10px,2vh,18px) clamp(22px,7vw,36px) var(--bot-pad);
  pointer-events:all;
}

#gallery{
  width:var(--aux);height:var(--aux);
  border-radius:3px;background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;flex-shrink:0;
}
#gallery img{width:100%;height:100%;object-fit:cover;display:none}

#shutter{
  width:var(--shutter);height:var(--shutter);
  border-radius:50%;border:0.5px solid rgba(255,255,255,0.5);
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.1s;flex-shrink:0;
}
#shutter:active{transform:scale(0.96)}
#shutter-inner{
  width:var(--shutter-inner);height:var(--shutter-inner);
  border-radius:50%;background:rgba(255,255,255,0.9);
  transition:border-radius 0.2s,width 0.2s,height 0.2s,background 0.2s;
}
#shutter.recording #shutter-inner{
  width:clamp(20px,6vw,28px);height:clamp(20px,6vw,28px);
  border-radius:2px;background:#fff;
}

#flip{
  width:var(--aux);height:var(--aux);
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0.7;transition:transform 0.4s;flex-shrink:0;
}
#flip:active{transform:rotate(180deg)}

/* Flash overlay */
#flash-overlay{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity 0.07s ease-out}

/* Gallery overlay */
#gallery-overlay{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:400;flex-direction:column}
#gallery-overlay.open{display:flex}
#gallery-header{
  padding:max(env(safe-area-inset-top),18px) clamp(18px,5vw,26px) 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid rgba(255,255,255,0.06);
}
#gallery-title{color:rgba(255,255,255,0.3);font-size:var(--font-xs);letter-spacing:2px;text-transform:uppercase}
#gallery-close{color:rgba(255,255,255,0.55);font-size:22px;cursor:pointer;background:none;border:none;padding:4px 6px;line-height:1}
#gallery-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;align-content:start}
.g-item{position:relative;overflow:hidden;aspect-ratio:1}
.g-item img{width:100%;height:100%;object-fit:cover;display:block}
.g-vid-badge{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.5);border-radius:2px;padding:2px 5px;font-size:10px;color:rgba(255,255,255,0.85)}
#gallery-empty{grid-column:span 3;padding:60px 20px;color:rgba(255,255,255,0.18);font-size:clamp(12px,3vw,14px);text-align:center;letter-spacing:0.5px}

#permission-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,3vh,22px);z-index:100}
#permission-screen p{color:rgba(255,255,255,0.4);font-size:clamp(12px,3vw,14px);text-align:center;max-width:200px;line-height:1.7;letter-spacing:0.3px}
#start-btn{background:none;border:0.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);font-size:clamp(12px,3vw,14px);padding:clamp(8px,2vh,12px) 32px;border-radius:2px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-weight:400}

@media(max-height:700px){
  #center{min-height:120px}
  #mode-strip{padding:3px 0}
}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="flash-overlay"></div>
<div id="overlay">
  <div id="top">
    <button class="top-btn" id="flash-btn" aria-label="Flash">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="rec-info">
      <div id="rec-dot"></div>
      <span id="rec-time"></span>
    </div>
    <span id="resolution">4K·30</span>
  </div>

  <div id="center">
    <div id="crosshair">
      <div class="dot-center"></div>
    </div>
  </div>

  <div id="mode-strip">
    <span data-m="photo">PHOTO</span>
    <span class="active" data-m="video">VIDEO</span>
    <span data-m="slow">SLOW</span>
  </div>

  <div id="bottom">
    <div id="gallery" role="button" aria-label="Gallery">
      <img id="gallery-thumb" alt="last photo">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <button id="shutter" aria-label="Capture"><div id="shutter-inner"></div></button>
    <button id="flip" aria-label="Flip camera">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7H4"/><polyline points="7 4 4 7 7 10"/>
        <path d="M4 17H20"/><polyline points="17 14 20 17 17 20"/>
      </svg>
    </button>
  </div>
</div>

<!-- Gallery overlay -->
<div id="gallery-overlay">
  <div id="gallery-header">
    <span id="gallery-title">Gallery</span>
    <button id="gallery-close">×</button>
  </div>
  <div id="gallery-grid"></div>
</div>

<div id="permission-screen">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  <p>Camera access is required</p>
  <button id="start-btn">Enable</button>
</div>
<script>
const video=document.getElementById('video'),recDot=document.getElementById('rec-dot'),recTime=document.getElementById('rec-time'),shutter=document.getElementById('shutter'),flipBtn=document.getElementById('flip'),permScreen=document.getElementById('permission-screen'),startBtn=document.getElementById('start-btn'),flashOverlay=document.getElementById('flash-overlay'),galleryEl=document.getElementById('gallery'),galleryThumb=document.getElementById('gallery-thumb'),galleryOverlay=document.getElementById('gallery-overlay'),galleryGrid=document.getElementById('gallery-grid'),galleryClose=document.getElementById('gallery-close');
let stream=null,timerInterval=null,seconds=0,facingMode='environment',mode='video',recording=false,captures=[];

async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:3840},height:{ideal:2160}},audio:false});video.srcObject=stream;video.className=facingMode==='user'?'front':'';permScreen.style.display='none'}catch(e){}}

flipBtn.addEventListener('click',()=>{facingMode=facingMode==='environment'?'user':'environment';startCamera()});
document.querySelectorAll('#mode-strip span').forEach(s=>{s.addEventListener('click',()=>{if(recording)return;document.querySelectorAll('#mode-strip span').forEach(x=>x.classList.remove('active'));s.classList.add('active');mode=s.dataset.m})});
shutter.addEventListener('click',()=>{if(!stream)return;if(mode==='photo'){takePhoto()}else{recording?stopFakeRec():startFakeRec()}});

function takePhoto(){flashOverlay.style.opacity='1';setTimeout(()=>{flashOverlay.style.opacity='0'},130);const canvas=document.createElement('canvas');canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;canvas.getContext('2d').drawImage(video,0,0);captures.unshift({type:'photo',url:canvas.toDataURL('image/jpeg',0.88)});refreshThumb()}
function startFakeRec(){recording=true;shutter.classList.add('recording');recDot.classList.add('visible');seconds=0;updateTime();timerInterval=setInterval(()=>{seconds++;updateTime()},1000)}
function stopFakeRec(){recording=false;clearInterval(timerInterval);shutter.classList.remove('recording');recDot.classList.remove('visible');recTime.textContent='';const canvas=document.createElement('canvas');canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;canvas.getContext('2d').drawImage(video,0,0);captures.unshift({type:'video',url:canvas.toDataURL('image/jpeg',0.75)});refreshThumb()}
function updateTime(){const m=String(Math.floor(seconds/60)).padStart(1,'0');const s=String(seconds%60).padStart(2,'0');recTime.textContent=`${m}:${s}`}
function refreshThumb(){if(!captures.length)return;galleryThumb.src=captures[0].url;galleryThumb.style.display='block';galleryEl.querySelector('svg').style.display='none'}

galleryEl.addEventListener('click',openGallery);
galleryClose.addEventListener('click',()=>galleryOverlay.classList.remove('open'));
function openGallery(){galleryGrid.innerHTML='';if(!captures.length){galleryGrid.innerHTML='<p id="gallery-empty">No captures yet</p>'}else{captures.forEach(c=>{const wrap=document.createElement('div');wrap.className='g-item';const img=document.createElement('img');img.src=c.url;wrap.appendChild(img);if(c.type==='video'){const badge=document.createElement('div');badge.className='g-vid-badge';badge.textContent='▶';wrap.appendChild(badge)}galleryGrid.appendChild(wrap)})}galleryOverlay.classList.add('open')}

startBtn.addEventListener('click',startCamera);
navigator.permissions?.query({name:'camera'}).then(r=>{if(r.state==='granted')startCamera()});
</script>
</body>
</html>
