<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cámara — Nordic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;width:100vw;height:100vh;overflow:hidden;font-family:-apple-system,"Helvetica Neue",sans-serif}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#video.front{transform:scaleX(-1)}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
#top{padding:env(safe-area-inset-top,20px) 24px 16px;display:flex;align-items:flex-start;justify-content:space-between}
.top-btn{pointer-events:all;background:none;border:none;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
#rec-info{display:flex;flex-direction:column;align-items:center;gap:4px}
#rec-dot{width:6px;height:6px;border-radius:50%;background:#e8e0d4;opacity:0;transition:opacity 0.2s}
#rec-dot.visible{opacity:1;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#rec-time{font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);letter-spacing:2px;font-variant-numeric:tabular-nums}
#resolution{font-size:11px;color:rgba(255,255,255,0.35);font-weight:400;letter-spacing:1.5px;text-align:right}
#center{flex:1;display:flex;align-items:center;justify-content:center}
#crosshair{position:relative;width:60px;height:60px}
#crosshair::before,#crosshair::after{content:"";position:absolute;background:rgba(255,255,255,0.6)}
#crosshair::before{width:1px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:1px;top:50%;transform:translateY(-50%)}
.dot-center{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.9);top:50%;left:50%;transform:translate(-50%,-50%)}
#bottom{padding:20px 32px env(safe-area-inset-bottom,36px);display:flex;align-items:center;justify-content:space-between;pointer-events:all}
#mode-strip{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);white-space:nowrap;display:flex;gap:20px;justify-content:center;pointer-events:all}
#mode-strip span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.28);cursor:pointer;padding:4px 0;transition:color 0.2s}
#mode-strip span.active{color:rgba(255,255,255,0.9);border-bottom:1px solid rgba(255,255,255,0.5)}
#gallery{width:48px;height:48px;border-radius:3px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
#gallery img{width:100%;height:100%;object-fit:cover;display:none}
#shutter{width:72px;height:72px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.5);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;position:relative}
#shutter:active{transform:scale(0.96)}
#shutter-inner{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.9);transition:border-radius 0.2s,width 0.2s,height 0.2s,background 0.2s}
#shutter.recording #shutter-inner{width:24px;height:24px;border-radius:2px;background:#fff}
#flip{width:48px;height:48px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.7;transition:transform 0.4s}
#flip:active{transform:rotate(180deg)}
#permission-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100}
#permission-screen p{color:rgba(255,255,255,0.4);font-size:13px;text-align:center;max-width:200px;line-height:1.7;letter-spacing:0.3px}
#start-btn{background:none;border:0.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);font-size:13px;padding:10px 32px;border-radius:2px;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;font-weight:400}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div id="top">
    <button class="top-btn" id="flash-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z" stroke="rgba(255,255,255,0.7)" stroke-width="1" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="rec-info">
      <div id="rec-dot"></div>
      <span id="rec-time"></span>
    </div>
    <span id="resolution">4K·30</span>
  </div>
  <div id="center">
    <div id="crosshair">
      <div class="dot-center"></div>
    </div>
  </div>
  <div id="bottom">
    <div id="mode-strip">
      <span>FOTO</span><span class="active">VIDEO</span><span>LENTO</span>
    </div>
    <div id="gallery">
      <img id="gallery-thumb" alt="última foto">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <button id="shutter"><div id="shutter-inner"></div></button>
    <button id="flip">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7H4"/><polyline points="7 4 4 7 7 10"/>
        <path d="M4 17H20"/><polyline points="17 14 20 17 17 20"/>
      </svg>
    </button>
  </div>
</div>
<div id="permission-screen">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  <p>Acceso a la cámara necesario</p>
  <button id="start-btn">Activar</button>
</div>
<script>
const video=document.getElementById('video'),recDot=document.getElementById('rec-dot'),recTime=document.getElementById('rec-time'),shutter=document.getElementById('shutter'),flipBtn=document.getElementById('flip'),permScreen=document.getElementById('permission-screen'),startBtn=document.getElementById('start-btn');
let stream=null,mediaRecorder=null,chunks=[],timerInterval=null,seconds=0,facingMode='environment';
async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:3840},height:{ideal:2160}},audio:true});video.srcObject=stream;video.className=facingMode==='user'?'front':'';permScreen.style.display='none'}catch(e){}}
flipBtn.addEventListener('click',()=>{facingMode=facingMode==='environment'?'user':'environment';startCamera()});
shutter.addEventListener('click',()=>{if(!stream)return;if(!mediaRecorder||mediaRecorder.state==='inactive'){startRecording()}else{stopRecording()}});
function startRecording(){chunks=[];const options=MediaRecorder.isTypeSupported('video/mp4')?{mimeType:'video/mp4'}:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?{mimeType:'video/webm;codecs=vp9'}:{};mediaRecorder=new MediaRecorder(stream,options);mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};mediaRecorder.onstop=saveVideo;mediaRecorder.start(100);shutter.classList.add('recording');recDot.classList.add('visible');seconds=0;updateTime();timerInterval=setInterval(()=>{seconds++;updateTime()},1000)}
function stopRecording(){mediaRecorder.stop();clearInterval(timerInterval);shutter.classList.remove('recording');recDot.classList.remove('visible');recTime.textContent=''}
function saveVideo(){const mime=chunks[0]?.type||'video/webm';const ext=mime.includes('mp4')?'mp4':'webm';const blob=new Blob(chunks,{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`video_${Date.now()}.${ext}`;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000)}
function updateTime(){const m=String(Math.floor(seconds/60)).padStart(1,'0');const s=String(seconds%60).padStart(2,'0');recTime.textContent=`${m}:${s}`}
startBtn.addEventListener('click',startCamera);
navigator.permissions?.query({name:'camera'}).then(r=>{if(r.state==='granted')startCamera()});
document.querySelectorAll('#mode-strip span').forEach(s=>{s.addEventListener('click',()=>{document.querySelectorAll('#mode-strip span').forEach(x=>x.classList.remove('active'));s.classList.add('active')})});
</script>
</body>
</html>
