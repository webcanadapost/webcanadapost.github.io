<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CANADA Signature Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f4f4f4; --black:#111; --muted:#888; --line:#cfcfcf; --button:#878787; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--black); font-family: 'Roboto Condensed', 'Arial Narrow', Arial, Helvetica, sans-serif; }
    .page { max-width: 980px; margin: 0 auto; padding: 28px 18px 60px; }
    .brand { text-align:center; margin-bottom:28px; }
    .brand img { width:76px; height:auto; display:inline-block; }
    h1 { margin:0 0 34px; text-align:center; font-size:30px; line-height:1; letter-spacing:1px; font-weight:800; }
    .card { max-width: 720px; margin:0 auto; background:#fff; border-radius:7px; box-shadow:0 5px 20px rgba(0,0,0,.12); padding:36px 38px; }
    label { display:block; margin:0 0 12px; font-size:18px; line-height:1; letter-spacing:1px; text-transform:uppercase; }
    input, select { width:100%; height:42px; font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; border:1px solid var(--line); border-radius:4px; padding:0 12px; font-size:16px; text-transform:uppercase; letter-spacing:.3px; background:#fff; }
    input::placeholder { color:#777; }
    .field { margin-bottom:36px; }
    .actions { display:grid; grid-template-columns: 1fr; gap:12px; margin-top: 6px; }
    button { font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; border:0; border-radius:4px; min-height:44px; padding:10px 16px; background:var(--button); color:white; text-transform:uppercase; letter-spacing:.4px; font-weight:800; font-size:17px; cursor:pointer; }
    button.secondary { background:#111; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .result { display:none; max-width: 880px; margin: 34px auto 0; }
    .result h2 { font-size:16px; letter-spacing:1px; text-transform:uppercase; margin:0 0 10px; }
    .preview-wrap { background:#fff; border:1px solid #ddd; border-radius:6px; padding:18px; overflow:auto; }
    textarea { width:100%; min-height:220px; margin-top:14px; border:1px solid #ddd; border-radius:6px; padding:12px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; }
    .hint { color:#666; font-size:13px; margin:10px 0 0; }
    .toast { display:none; position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#111; color:#fff; padding:10px 14px; border-radius:20px; font-size:14px; }
    @media (max-width:700px) { .card { padding:28px 22px; } h1 { font-size:25px; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand"><img src="https://webcanadapost.github.io/assets/CANADA-Logotype-2022-RGB-Black.png" alt="CANADA" /></div>
    <h1>SIGNATURE GENERATOR</h1>

    <section class="card" aria-label="Signature form">
      <div class="field"><label for="name">Name</label><input id="name" placeholder="Required" autocomplete="given-name" required /></div>
      <div class="field"><label for="surname">Surname</label><input id="surname" placeholder="Required" autocomplete="family-name" required /></div>
      <div class="field"><label for="pronouns">Pronouns</label><input id="pronouns" placeholder="If you feel like it - he/him, she/her, they/them" /></div>
      <div class="field"><label for="role">Role</label><input id="role" placeholder="Required" required /></div>
      <div class="field"><label for="phone">Phone number (add prefix)</label><input id="phone" placeholder="Required" inputmode="tel" required /></div>
      <div class="field"><label for="office">Office</label><select id="office"><option>Barcelona</option><option>Los Angeles</option><option>UK</option></select></div>
      <div class="actions">
        <button type="button" id="generateBtn">Generate signature</button>
        <button type="button" class="secondary" id="copyRenderedBtn" disabled>Copy signature for email</button>
        <button type="button" class="secondary" id="copyHtmlBtn" disabled>Copy HTML</button>
      </div>
      <p class="hint">Tip: use “Copy signature for email” and paste directly into Gmail/Outlook signature settings.</p>
    </section>

    <section class="result" id="result">
      <h2>Preview</h2>
      <div class="preview-wrap"><div id="preview"></div></div>
      <textarea id="htmlOutput" readonly aria-label="Generated signature HTML"></textarea>
    </section>
  </main>
  <div class="toast" id="toast">Copied</div>

<script>
const CANADA_LOGO = "https://webcanadapost.github.io/assets/CANADA-Logotype-2022-RGB-Black.png";
const ADAGE_LOGO = "https://webcanadapost.github.io/assets/2026_AA_ProdAList.jpg";
const LEGAL_TEXTS = {'Barcelona': 'LAS MONTAÑAS DEL CANADA S.L., informs that all the data received through online forms and/or by email will be processed with strict confidentiality in accordance with the Privacy and Security Policy of LAS MONTAÑAS DEL CANADA S.L., as well as with Regulation (EU) 2016/679 of the European Parliament and of the Council of 27 April 2016 on the protection of natural persons with regard to the processing of personal data and on the free movement of such data (General Data Protection Regulation or GDPR). The purpose of processing these data is to respond to the communications received and, if applicable, maintain the corresponding contractual relations. The lawful basis being your consent, performance of pre-contractual or contractual measures, compliance with legal obligations and/or legitimate interests pursued by LAS MONTAÑAS DEL CANADA S.L. To exercise the rights of access, suppression/deletion, rectification, opposition, portability or limitation, and for any clarification, you can contact us by sending us an email to info@canadacanada.com. In any event, the interested have the right to file a claim in front of the appropriate Data Protection Authority. The personal data provided will be kept for the time legally or contractually foreseen or while your consent is maintained. The collected data will not be transferred, with the exception of legal obligation or permission. Please contact info@canadacanada.com immediately about any change or modification related to the information you provided, in order that it responds truthfully to your current personal situation.', 'Los Angeles': 'CANADA LOS ANGELES INC. informs that all the data received through online forms and/or by email will be processed with strict confidentiality in accordance with the Privacy and Security Policy of CANADA LOS ANGELES INC. as well as with the federal/state legal and regulatory framework. The purpose of processing these data is to respond to the communications received and, if applicable, maintain the corresponding contractual relations. The lawful basis being your consent, performance of pre-contractual or contractual measures, compliance with legal obligations and/or legitimate interests pursued by CANADA LOS ANGELES INC. To exercise the rights of access, suppression/deletion, rectification, opposition, portability or limitation, and for any clarification, you can contact us by sending an email to losangeles@canadacanada.com. In any event, the interested have the right to file a claim in front of the appropriate Data Protection Authority. The personal data provided will be kept for the time legally or contractually foreseen or while your consent is maintained. The collected data will not be transferred, with the exception of legal obligation or permission. Please contact losangeles@canadacanada.com immediately about any change or modification related to the information you provided, in order that it responds truthfully to your current personal situation.', 'UK': 'CANADA LONDON LTD informs that all the data received through online forms and/or by email will be processed with strict confidentiality in accordance with the Privacy and Security Policy of CANADA LONDON LTD as well as with UK-GDPR (United Kingdom General Data Protection Regulation). The purpose of processing these data is to respond to the communications received and, if applicable, maintain the corresponding contractual relations. The lawful basis being your consent, performance of pre-contractual or contractual measures, compliance with legal obligations and/or legitimate interests pursued by CANADA LONDON LTD. To exercise the rights of access, suppression/deletion, rectification, opposition, portability or limitation, and for any clarification, you can contact us by sending an email to london@canadacanada.com. In any event, the interested have the right to file a claim in front of the appropriate Data Protection Authority. The personal data provided will be kept for the time legally or contractually foreseen or while your consent is maintained. The collected data will not be transferred, with the exception of legal obligation or permission. Please contact london@canadacanada.com immediately about any change or modification related to the information you provided, in order that it responds truthfully to your current personal situation.'};

function esc(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function clean(value) { return String(value || "").trim(); }
function upper(value) { return clean(value).toUpperCase(); }
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => toast.style.display = 'none', 1800);
}
function requiredIds() { return ['name','surname','role','phone']; }
function hasRequiredFields() { return requiredIds().every(id => clean(document.getElementById(id).value)); }
function legalWithLinks(text) {
  const safe = esc(text);
  return safe.replace(/([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,})/gi, '<a href="mailto:$1" style="color:#6f9fd8; text-decoration:underline; font-weight:400;">$1</a>');
}
function buildSignature() {
  const name = upper(document.getElementById('name').value);
  const surname = upper(document.getElementById('surname').value);
  const pronouns = upper(document.getElementById('pronouns').value);
  const role = upper(document.getElementById('role').value);
  const phone = esc(clean(document.getElementById('phone').value));
  const office = document.getElementById('office').value;
  const fullName = esc(name + ' ' + surname + (pronouns ? ' (' + pronouns + ')' : ''));
  const roleLine = esc(role);
  const legal = legalWithLinks(LEGAL_TEXTS[office] || '');

  return `
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="width:650px; max-width:650px; font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; color:#1d1d1d; border-collapse:collapse; mso-table-lspace:0pt; mso-table-rspace:0pt;">
  <tr>
    <td style="padding:0 0 8px 0; font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; font-size:12px; line-height:14px; letter-spacing:.2px; text-transform:uppercase; color:#1d1d1d;">
      <div style="font-weight:400;">${fullName}</div>
      <div style="font-weight:400;">${roleLine}</div>
    </td>
  </tr>
  <tr>
    <td style="padding:0 0 7px 0;">
      <img src="${CANADA_LOGO}" width="72" alt="CANADA" style="display:block; width:72px; height:auto; border:0; outline:none; text-decoration:none;" />
    </td>
  </tr>
  <tr>
    <td style="padding:0 0 8px 0; font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; font-size:12px; line-height:15px; letter-spacing:.2px; text-transform:uppercase; color:#1d1d1d;">
      <div>${phone}</div>
      <div><a href="https://canadacanada.com" style="color:#1d1d1d; text-decoration:none;">CANADACANADA.COM</a></div>
    </td>
  </tr>
  <tr>
    <td style="padding:0 0 14px 0;">
      <img src="${ADAGE_LOGO}" width="160" alt="Ad Age Production Company A-List 2026" style="display:block; width:160px; height:auto; border:0; outline:none; text-decoration:none;" />
    </td>
  </tr>
  <tr>
    <td style="padding:0; font-family:'Roboto Condensed','Arial Narrow',Arial,Helvetica,sans-serif; font-size:8px; line-height:11px; color:#d6d6d6; font-weight:300;">
      ${legal}
    </td>
  </tr>
</table>`.trim();
}
function generateSignature() {
  if (!hasRequiredFields()) { showToast('Please fill in all required fields'); return; }
  const signature = buildSignature();
  document.getElementById('preview').innerHTML = signature;
  document.getElementById('htmlOutput').value = signature;
  document.getElementById('result').style.display = 'block';
  document.getElementById('copyRenderedBtn').disabled = false;
  document.getElementById('copyHtmlBtn').disabled = false;
}
async function copyHtml() {
  const html = document.getElementById('htmlOutput').value;
  if (!html) return;
  try {
    await navigator.clipboard.writeText(html);
    showToast('HTML copied');
  } catch (e) {
    try {
      const field = document.getElementById('htmlOutput');
      field.select();
      const ok = document.execCommand('copy');
      window.getSelection()?.removeAllRanges();
      if (ok) { showToast('HTML copied'); } else { showToast('Could not copy — please copy manually'); }
    } catch (fallbackError) {
      showToast('Could not copy — please copy manually');
    }
  }
}
async function copyRendered() {
  const html = document.getElementById('htmlOutput').value;
  if (!html) return;
  try {
    const item = new ClipboardItem({
      'text/html': new Blob([html], { type: 'text/html' }),
      'text/plain': new Blob([document.getElementById('preview').innerText], { type: 'text/plain' })
    });
    await navigator.clipboard.write([item]);
    showToast('Signature copied');
  } catch (e) {
    try {
      const range = document.createRange();
      range.selectNodeContents(document.getElementById('preview'));
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      const ok = document.execCommand('copy');
      selection.removeAllRanges();
      if (ok) { showToast('Signature copied'); } else { showToast('Could not copy — please select and copy manually'); }
    } catch (fallbackError) {
      showToast('Could not copy — please select and copy manually');
    }
  }
}
document.getElementById('generateBtn').addEventListener('click', generateSignature);
document.getElementById('copyHtmlBtn').addEventListener('click', copyHtml);
document.getElementById('copyRenderedBtn').addEventListener('click', copyRendered);
['name','surname','pronouns','role','phone','office'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') generateSignature(); }));
</script>

</body>
</html>
