<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cámara">
<title>Cámara</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }

  /* ── Camera feed ── */
  #video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(1);
  }
  #video.front { transform: scaleX(-1); }

  /* ── Overlay container ── */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }

  /* ── Top bar ── */
  #top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 16px) 20px 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent);
  }

  .top-btn {
    pointer-events: all;
    background: none;
    border: none;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #rec-info {
    display: flex;
    align-items: center;
    gap: 7px;
    min-width: 60px;
    justify-content: center;
  }

  #rec-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff3b30;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #rec-dot.visible { opacity: 1; animation: blink 1.8s ease-in-out infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #rec-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
  }

  #resolution {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    letter-spacing: 0.3px;
    text-align: right;
    min-width: 48px;
  }

  /* ── AF Box (center) ── */
  #center {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
  }

  #af-wrap {
    position: relative;
    width: 76px;
    height: 76px;
    margin-right: -44px; /* shift slightly left of center to leave room for sun */
  }

  /* Corner brackets via pseudo elements + borders */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: #ffd60a;
    border-style: solid;
    border-width: 0;
  }
  .tl { top: 0; left: 0;  border-top-width: 1.5px; border-left-width: 1.5px; }
  .tr { top: 0; right: 0; border-top-width: 1.5px; border-right-width: 1.5px; }
  .bl { bottom: 0; left: 0;  border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .br { bottom: 0; right: 0; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  /* Sun + slider */
  #sun-wrap {
    position: absolute;
    right: -44px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  #sun-icon {
    width: 18px;
    height: 18px;
    color: #ffd60a;
  }

  #exp-track {
    width: 2px;
    height: 36px;
    background: rgba(255,214,10,0.3);
    border-radius: 1px;
    position: relative;
  }
  #exp-thumb {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ffd60a;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── Bottom bar ── */
  #bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 36px env(safe-area-inset-bottom, 32px);
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    pointer-events: all;
  }

  /* Gallery thumbnail */
  #gallery {
    width: 52px;
    height: 42px;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
  }
  #gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  #gallery svg { opacity: 0.6; }

  /* Shutter */
  #shutter {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 3.5px solid #fff;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #shutter:active { transform: scale(0.95); }

  #shutter-inner {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #ff3b30;
    transition: border-radius 0.25s cubic-bezier(.4,0,.2,1),
                width 0.25s cubic-bezier(.4,0,.2,1),
                height 0.25s cubic-bezier(.4,0,.2,1);
  }
  #shutter.recording #shutter-inner {
    width: 34px;
    height: 34px;
    border-radius: 6px;
  }

  /* Flip */
  #flip {
    width: 52px;
    height: 42px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  }
  #flip:active { transform: rotate(180deg); }

  /* ── Permission screen ── */
  #permission-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #permission-screen svg { opacity: 0.35; }
  #permission-screen p {
    color: rgba(255,255,255,0.6);
    font-size: 15px;
    text-align: center;
    max-width: 220px;
    line-height: 1.5;
  }
  #permission-screen button {
    margin-top: 8px;
    background: none;
    border: 1px solid rgba(255,214,10,0.6);
    color: #ffd60a;
    font-size: 15px;
    padding: 10px 28px;
    border-radius: 22px;
    cursor: pointer;
  }

  #error-msg {
    display: none;
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 200;
  }
</style>
</head>
<body>

<!-- Camera feed -->
<video id="video" autoplay playsinline muted></video>

<!-- Overlay -->
<div id="overlay">

  <!-- Top -->
  <div id="top">
    <button class="top-btn" id="flash-btn" aria-label="Flash">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"
          fill="#ffd60a" stroke="#ffd60a" stroke-width="1" stroke-linejoin="round"/>
      </svg>
    </button>

    <div id="rec-info">
      <div id="rec-dot"></div>
      <span id="rec-time"></span>
    </div>

    <span id="resolution">4K · 30</span>
  </div>

  <!-- Center: AF box -->
  <div id="center">
    <div id="af-wrap">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="sun-wrap">
        <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd60a" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
          <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
        <div id="exp-track"><div id="exp-thumb"></div></div>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div id="bottom">
    <div id="gallery" role="button" aria-label="Galería">
      <img id="gallery-thumb" alt="última foto">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>

    <button id="shutter" aria-label="Grabar">
      <div id="shutter-inner"></div>
    </button>

    <button id="flip" aria-label="Cambiar cámara">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7H4"/>
        <polyline points="7 4 4 7 7 10"/>
        <path d="M4 17H20"/>
        <polyline points="17 14 20 17 17 20"/>
      </svg>
    </button>
  </div>
</div>

<!-- Permission screen -->
<div id="permission-screen">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
    <circle cx="12" cy="13" r="4"/>
  </svg>
  <p>Necesita acceso a la cámara para funcionar</p>
  <button id="start-btn">Activar cámara</button>
</div>

<div id="error-msg"></div>

<script>
  const video       = document.getElementById('video');
  const recDot      = document.getElementById('rec-dot');
  const recTime     = document.getElementById('rec-time');
  const shutter     = document.getElementById('shutter');
  const flipBtn     = document.getElementById('flip');
  const permScreen  = document.getElementById('permission-screen');
  const startBtn    = document.getElementById('start-btn');
  const errorMsg    = document.getElementById('error-msg');

  let stream        = null;
  let mediaRecorder = null;
  let chunks        = [];
  let timerInterval = null;
  let seconds       = 0;
  let facingMode    = 'environment'; // back camera default

  // ── Start camera ──
  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          width:  { ideal: 3840 },
          height: { ideal: 2160 }
        },
        audio: true
      });

      video.srcObject = stream;
      video.className = facingMode === 'user' ? 'front' : '';
      permScreen.style.display = 'none';

    } catch (e) {
      showError('No se pudo acceder a la cámara');
    }
  }

  // ── Flip ──
  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  // ── Record ──
  shutter.addEventListener('click', () => {
    if (!stream) return;
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      startRecording();
    } else {
      stopRecording();
    }
  });

  function startRecording() {
    chunks = [];
    const options = MediaRecorder.isTypeSupported('video/mp4')
      ? { mimeType: 'video/mp4' }
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? { mimeType: 'video/webm;codecs=vp9' }
      : {};

    mediaRecorder = new MediaRecorder(stream, options);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = saveVideo;
    mediaRecorder.start(100);

    shutter.classList.add('recording');
    recDot.classList.add('visible');
    seconds = 0;
    updateTime();
    timerInterval = setInterval(() => { seconds++; updateTime(); }, 1000);
  }

  function stopRecording() {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    shutter.classList.remove('recording');
    recDot.classList.remove('visible');
    recTime.textContent = '';
  }

  function saveVideo() {
    const mime  = chunks[0]?.type || 'video/webm';
    const ext   = mime.includes('mp4') ? 'mp4' : 'webm';
    const blob  = new Blob(chunks, { type: mime });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href      = url;
    a.download  = `video_${Date.now()}.${ext}`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  function updateTime() {
    const m = String(Math.floor(seconds / 60)).padStart(1, '0');
    const s = String(seconds % 60).padStart(2, '0');
    recTime.textContent = `${m}:${s}`;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
  }

  // ── Init ──
  startBtn.addEventListener('click', startCamera);

  // Auto-start if permissions already granted
  navigator.permissions?.query({ name: 'camera' }).then(r => {
    if (r.state === 'granted') startCamera();
  });
</script>
</body>
</html>
